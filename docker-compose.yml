# =============================================================================
# 深瞳AI 智能中台 - 全栈 Docker 编排
# 启动:docker compose up -d --build
# 停止:docker compose down
# 数据清除:docker compose down -v
# =============================================================================

services:
  # ---------- MySQL 8.0 ----------
  mysql:
    image: mysql:8.0
    container_name: shentong-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-shentong_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_agent}
      MYSQL_USER: ${MYSQL_USER:-shentong}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shentong_pwd_2026}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-shentong_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shentong-net

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: shentong-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-shentong_redis_2026} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-shentong_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shentong-net

  # ---------- NestJS 后端 ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shentong-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 从 .env 加载全部环境变量到容器(spec 要求 env_file)
    env_file:
      - .env
    # 显式声明关键变量(覆盖 env_file,提供默认值与容器内网络地址映射)
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-shentong}
      DB_PASSWORD: ${MYSQL_PASSWORD:-shentong_pwd_2026}
      DB_DATABASE: ${MYSQL_DATABASE:-ai_agent}
      REDIS_URL: redis://:${REDIS_PASSWORD:-shentong_redis_2026}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars-please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-jwt-secret-32-chars}
      ADMIN_JWT_EXPIRES_IN: ${ADMIN_JWT_EXPIRES_IN:-8h}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      SWAGGER_PATH: ${SWAGGER_PATH:-api/docs}
    ports:
      - "3001:3001"
    networks:
      - shentong-net

  # ---------- Nginx 反向代理 ----------
  nginx:
    image: nginx:alpine
    container_name: shentong-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./updates:/usr/share/nginx/html/desktop:ro
      - ./frontend/user/dist:/usr/share/nginx/html/landing:ro
      - ./frontend/admin/dist:/usr/share/nginx/html/admin:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - shentong-net

# ---------- 自定义网络 ----------
networks:
  shentong-net:
    driver: bridge
    name: shentong-net

# ---------- 持久化卷 ----------
volumes:
  mysql_data:
    name: shentong-mysql-data
  redis_data:
    name: shentong-redis-data
