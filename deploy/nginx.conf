# =============================================================================
# 深瞳AI 智能中台 - Nginx 反向代理配置
#
# 功能:
# 1. API 反向代理(后端 NestJS,含 WebSocket 升级)
# 2. 安装包下载站(electron-updater 自动更新)
# 3. HTTPS 预留(后续 certbot 升级)
#
# 部署:挂载到 /etc/nginx/conf.d/default.conf
# =============================================================================

# ---------- 上游后端 ----------
upstream shentong_backend {
    server backend:3001;
    keepalive 32;
}

# ---------- API 服务(api.shentong.ai)----------
server {
    listen 80;
    server_name api.shentong.ai _;

    # 文件上传大小限制(知识库文档、头像等)
    client_max_body_size 100M;

    # 日志
    access_log /var/log/nginx/api.access.log;
    error_log /var/log/nginx/api.error.log;

    # ---------- API 接口 ----------
    location /api/ {
        proxy_pass http://shentong_backend;
        proxy_http_version 1.1;

        # 透传客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 通用超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---------- WebSocket(Socket.IO 长连接)----------
    location /api/socket.io/ {
        proxy_pass http://shentong_backend;
        proxy_http_version 1.1;

        # WebSocket 升级头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接超时(24 小时)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------- 健康检查(直通)----------
    location /api/health {
        proxy_pass http://shentong_backend;
        access_log off;
    }

    # ---------- Swagger 文档 ----------
    location /api/docs {
        proxy_pass http://shentong_backend;
        proxy_set_header Host $host;
    }

    # ---------- 根路径(健康提示)----------
    location / {
        return 200 '深瞳AI API 服务运行中\n';
        add_header Content-Type text/plain;
    }
}

# ---------- 安装包下载站(update.shentong.ai)----------
server {
    listen 80;
    server_name update.shentong.ai;

    # 日志
    access_log /var/log/nginx/update.access.log;
    error_log /var/log/nginx/update.error.log;

    # ---------- 桌面客户端下载与自动更新 ----------
    location /desktop/ {
        alias /usr/share/nginx/html/desktop/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # 允许跨域(electron-updater 检查更新需要)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Content-Type' always;

        # 大文件优化
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # 缓存策略(安装包与 latest.yml 不缓存)
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- 根路径 ----------
    location / {
        return 302 /desktop/;
    }
}

# ---------- Landing 站点(zt.shentongapi.cn)----------
server {
    listen 80;
    server_name zt.shentongapi.cn;

    # 日志
    access_log /var/log/nginx/landing.access.log;
    error_log /var/log/nginx/landing.error.log;

    # ---------- SPA 静态文件服务 ----------
    root /usr/share/nginx/html/landing;
    index index.html;

    # SPA fallback:刷新子路由不 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 静态资源缓存 ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------- 安装包下载(与 update.shentongapi.cn 共享)----------
    location /desktop/ {
        alias /usr/share/nginx/html/desktop/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # 允许跨域(客户端检查更新需要)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;

        # 大文件优化
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # 不缓存安装包与 latest.yml
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
