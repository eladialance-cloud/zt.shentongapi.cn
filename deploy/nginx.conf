# =============================================================================
# 深瞳AI 智能中台 - Nginx 反向代理配置
#
# 功能:
# 1. API 反向代理(后端 NestJS,含 WebSocket 升级)
# 2. 安装包下载站(electron-updater 自动更新)
# 3. HTTPS (Let's Encrypt 证书)
# 4. 管理后台 SPA (/admin/*)
#
# 挂载: 挂载到 /etc/nginx/conf.d/default.conf
# =============================================================================

# ---------- 上游后端 ----------
upstream shentong_backend {
    server backend:3001;
    keepalive 32;
}

# ---------- API 服务(api.shentong.ai)----------
server {
    listen 80;
    server_name api.shentong.ai _;

    client_max_body_size 100M;

    access_log /var/log/nginx/api.access.log;
    error_log /var/log/nginx/api.error.log;

    # ---------- API 接口 ----------
    location /api/ {
        proxy_pass http://shentong_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---------- WebSocket(Socket.IO 长连接)----------
    location /api/socket.io/ {
        proxy_pass http://shentong_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------- 健康检查 ----------
    location /api/health {
        proxy_pass http://shentong_backend;
        access_log off;
    }

    # ---------- Swagger 文档 ----------
    location /api/docs {
        proxy_pass http://shentong_backend;
        proxy_set_header Host $host;
    }

    # ---------- 根路径 ----------
    location / {
        return 200 '深瞳AI API 服务运行中\n';
        add_header Content-Type text/plain;
    }
}

# ---------- 安装包下载站(update.shentong.ai)----------
server {
    listen 80;
    server_name update.shentong.ai;

    access_log /var/log/nginx/update.access.log;
    error_log /var/log/nginx/update.error.log;

    location /desktop/ {
        alias /usr/share/nginx/html/desktop/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Content-Type' always;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        return 302 /desktop/;
    }
}

# ---------- Landing 站点 + 管理后台(zt.shentongapi.cn)----------
# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name zt.shentongapi.cn;

    # ACME challenge 验证目录（certbot 使用）
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # 其余全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    http2 on;
    server_name zt.shentongapi.cn;

    # ---------- SSL 证书 ----------
    ssl_certificate /etc/nginx/ssl/zt.shentongapi.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/zt.shentongapi.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/landing.access.log;
    error_log /var/log/nginx/landing.error.log;

    client_max_body_size 100M;

    # ---------- SPA 静态文件服务 ----------
    root /usr/share/nginx/html/landing;
    index index.html;

    # SPA fallback: 刷新子路由不 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 管理后台 Web(/admin/*)----------
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ---------- API 反向代理 ----------
    location /api/ {
        proxy_pass http://shentong_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---------- WebSocket ----------
    location /api/socket.io/ {
        proxy_pass http://shentong_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------- 静态资源缓存 ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------- 安装包下载 ----------
    location /desktop/ {
        alias /usr/share/nginx/html/desktop/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
